 <button class="btn-outline" (click)="getInfoPatient()">Ajouter un patient</button>
<div class="card">
    <div>

    </div> 
    <div class="card-body">

        <h5 class="card-title">{{ title }} <form class="form-inline my-2 my-lg-0"><br>
          <div class="form-inline my-2 my-lg-0">
            <input class="form" type="search" [placeholder]="title" aria-label="Search">

          </div>
        </form></h5>
      
        <hr>
        <!-- <a href="#" class="btn btn-primary">Ajouter un patient</a>
        <a href="#" class="btn btn-secondary">Voir les patients</a> -->
    </div> 
  <table class="table">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">Prenom</th>
      <th scope="col">Nom</th> 
      <th scope="col">Email</th>
      <th scope="col">Age</th>
    </tr>
  </thead>
  <tbody>
<tr *ngFor="let item of patients2; let i = index">
      <th scope="row">{{ i + 1 }}</th>
      <td>{{ item.prenom }}</td>
      <td>{{ item.nom }}</td>
      <td>{{ item.email }}</td>
      <td>{{ item.age }}</td>
    </tr>
  </tbody>
</table>   
</div>
